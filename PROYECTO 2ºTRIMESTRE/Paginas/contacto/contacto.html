<main>

<section class="section">

  <h1>Contacto</h1>
  <p>Rellena el formulario y te responderemos lo antes posible.</p>

  <!-- FLEX  -->
  <div class="contacto-flex">

    <!-- FORMULARIO -->
    <article class="card">

      <h2>Formulario</h2>

 
      <form class="form-contacto">

        <label>Nombre</label>
        <input type="text" required>

        <label>Apellidos</label>
        <input type="text" required>

        <label>Correo</label>
        <input type="email" required>

        <label>Motivo</label>
        <select required>
          <option>Selecciona una opción</option>
          <option>Pedido</option>
          <option>Producto</option>
          <option>Devolución</option>
          <option>Envíos</option>
        </select>

        <p><strong>Preferencia</strong></p>
        <label><input type="radio" name="r" checked>Email</label>
        <label><input type="radio" name="r">Teléfono</label>

        <p><strong>Opciones</strong></p>
        <label><input type="checkbox">Novedades</label>
        <label><input type="checkbox" required>Privacidad</label>

         <p><strong>Mensaje</strong></p>
        <textarea rows="5"></textarea>

        <button type="submit" class="btn">Enviar</button>

      </form>

    </article>

    <!-- MAPA -->
    <article class="card">

      <h2>Nuestra tienda</h2>

      <p>
        Tel: 928 788 675 <br>
        Calle Numancia 13, 35010<br>
        Las Palmas · España
      </p>

      <iframe
        src="https://www.google.com/maps?q=Calle%20Numancia%2013%20Las%20Palmas&output=embed"
        width="100%"
        height="650"
